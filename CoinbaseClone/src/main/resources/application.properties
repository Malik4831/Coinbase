# Database Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/coinbase_clone}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Server Configuration
server.port=${PORT:8080}


# Note: this can remain default/legacy, but we now use token-specific addresses via TokenRegistry (database-driven)
web3j.contract-address=0xYourContractAddressHere
web3j.provider.url=${WEB3J_PROVIDER_URL:https://sepolia.gateway.tenderly.co/6VnYb8FKynzGGiSo1aIjZn}
wallet.private.key=${WALLET_PRIVATE_KEY:09f563e5b755d479f8138074588e19101b8d6269dd0e0e11856260d9f87c9293}

# Token management is now database-driven
# Use /api/admin/tokens endpoints to add/manage tokens
# No properties needed - tokens are stored in the 'tokens' table

# JWT Configuration
jwt.secret=${JWT_SECRET:coinbaseclone-dev-secret-key-2026-keep-out-of-production}
jwt.expiration-ms=86400000

# Wallet Configuration (HD Wallet Derivation)
# WARNING: In production, use environment variables or secure vault for these values
wallet.master-mnemonic=${WALLET_MASTER_MNEMONIC:abandon abandon abandon abandon abandon abandon abandon abandon abandon abandon abandon about}
wallet.master-password=${WALLET_MASTER_PASSWORD:}

# Custodial exchange platform inventory account
exchange.platform-user-email=${EXCHANGE_PLATFORM_USER_EMAIL:platform@exchange.local}
